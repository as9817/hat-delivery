name: Deploy Firebase Functions

on:
  push:
    branches: [ main ]
    paths:
      - 'functions/**'
      - 'firebase.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Functions dependencies
        run: cd functions && npm install

      - name: Create env file
        env:
          GOOGLE_VISION_KEY: ${{ secrets.GOOGLE_VISION_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          KAKAO_KEY: ${{ secrets.KAKAO_KEY }}
        run: |
          printf 'GOOGLE_VISION_KEY=%s\nGEMINI_KEY=%s\nKAKAO_KEY=%s\n' \
            "$GOOGLE_VISION_KEY" "$GEMINI_KEY" "$KAKAO_KEY" > functions/.env

      - name: Deploy Functions
        run: firebase deploy --only functions --project wellbingmart-d5ee1 --token "${{ secrets.FIREBASE_TOKEN }}"
