<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>웰빙마트 배달</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: #f0f4f0; }
    #loginScreen {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(160deg, #155d30 0%, #22a65a 100%); padding: 24px;
    }
    .login-logo { font-size: 60px; margin-bottom: 12px; }
    .login-title { color: white; font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .login-sub { color: rgba(255,255,255,0.75); font-size: 14px; margin-bottom: 40px; }
    .login-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 300px; }
    .driver-btn {
      background: white; border: none; border-radius: 18px; padding: 24px 12px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2); transition: transform 0.12s;
    }
    .driver-btn:active { transform: scale(0.93); }
    .driver-btn .d-icon { font-size: 30px; }
    .driver-btn .d-name { font-size: 15px; font-weight: 700; color: #155d30; }
    #appScreen { display: none; flex-direction: column; min-height: 100vh; }
    #fbBar { background: #f59e0b; color: white; text-align: center; font-size: 11px; padding: 4px; font-weight: 600; }
    #fbBar.online { background: #16a34a; }
    .app-header {
      background: #155d30; color: white; padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100; box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    }
    .hd-left { display: flex; align-items: center; gap: 10px; }
    .hd-logo { font-size: 22px; }
    .hd-info h3 { font-size: 14px; font-weight: 700; }
    .hd-info p { font-size: 10px; opacity: 0.75; }
    .hd-right { display: flex; align-items: center; gap: 8px; }
    .gps-pill { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.18); padding: 4px 10px; border-radius: 20px; font-size: 11px; }
    .gps-dot { width: 8px; height: 8px; border-radius: 50%; background: #9ca3af; }
    .gps-dot.on { background: #4ade80; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .logout-btn { background: rgba(255,255,255,0.18); border: none; color: white; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .tab-bar { display: flex; background: white; border-bottom: 2px solid #e5e7eb; position: sticky; top: 53px; z-index: 99; }
    .tab-btn { flex: 1; padding: 11px 4px; border: none; background: none; font-size: 13px; font-weight: 600; color: #9ca3af; cursor: pointer; position: relative; }
    .tab-btn.active { color: #155d30; }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 3px; background: #155d30; border-radius: 2px 2px 0 0; }
    .badge { display: inline-block; background: #ef4444; color: white; font-size: 10px; padding: 1px 5px; border-radius: 10px; margin-left: 4px; }
    .tab-pane { display: none; padding: 12px; }
    .tab-pane.active { display: block; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .stat-box { background: white; border-radius: 12px; padding: 12px 8px; text-align: center; box-shadow: 0 1px 5px rgba(0,0,0,0.07); }
    .stat-n { font-size: 26px; font-weight: 800; color: #155d30; line-height: 1; }
    .stat-l { font-size: 10px; color: #9ca3af; margin-top: 4px; }
    .d-card { background: white; border-radius: 14px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); border-left: 4px solid #e5e7eb; }
    .d-card.pending { border-left-color: #f59e0b; }
    .d-card.delivering { border-left-color: #3b82f6; }
    .d-card.completed { border-left-color: #16a34a; opacity: 0.85; }
    .d-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .d-customer { font-size: 16px; font-weight: 700; color: #111; }
    .st-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .st-pending   { background: #fef3c7; color: #b45309; }
    .st-delivering { background: #dbeafe; color: #1d4ed8; }
    .st-completed  { background: #dcfce7; color: #15803d; }
    .d-addr { font-size: 13px; color: #555; margin-bottom: 2px; }
    .d-phone { font-size: 12px; color: #888; }
    .d-note { font-size: 12px; color: #666; font-style: italic; margin-top: 4px; }
    .d-meta { font-size: 11px; color: #bbb; margin-top: 5px; display: flex; flex-wrap: wrap; gap: 8px; }
    .has-photo { color: #16a34a; font-weight: 600; }
    .d-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .act-btn { flex: 1; min-width: 72px; padding: 8px 6px; border: none; border-radius: 9px; font-size: 12px; font-weight: 700; cursor: pointer; text-align: center; }
    .act-btn:active { filter: brightness(0.88); }
    .btn-start   { background: #3b82f6; color: white; }
    .btn-receipt { background: #f59e0b; color: white; }
    .btn-done    { background: #155d30; color: white; }
    .btn-call    { background: #6b7280; color: white; }
    .btn-view    { background: #8b5cf6; color: white; }
    .sec-head { font-size: 12px; color: #9ca3af; font-weight: 700; padding: 6px 2px; margin-top: 4px; }
    .empty { text-align: center; padding: 50px 20px; color: #bbb; }
    .empty .ei { font-size: 50px; margin-bottom: 12px; }
    .empty p { font-size: 13px; line-height: 1.6; }
    .form-grp { margin-bottom: 14px; }
    .form-lbl { display: block; font-size: 12px; font-weight: 700; color: #444; margin-bottom: 5px; }
    .form-inp { width: 100%; padding: 12px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 14px; background: white; font-family: inherit; }
    .form-inp:focus { outline: none; border-color: #155d30; }
    textarea.form-inp { resize: vertical; min-height: 70px; }
    .submit-btn { width: 100%; padding: 14px; background: #155d30; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 6px; }
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .cam-wrap { width: 100%; max-width: 480px; padding: 0 12px; }
    .cam-title { color: white; text-align: center; font-size: 15px; font-weight: 700; padding: 12px 0; }
    #camVideo { width: 100%; max-height: 56vh; background: #111; display: block; border-radius: 10px; object-fit: cover; }
    .cam-btns { display: flex; justify-content: center; gap: 14px; padding: 16px 0; }
    .cbtn { padding: 11px 22px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .cbtn-cancel { background: rgba(255,255,255,0.18); color: white; }
    .cbtn-file   { background: #f59e0b; color: white; }
    .cbtn-shoot  { background: white; color: #155d30; }
    #camCanvas { display: none; }
    .prev-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
    .prev-bg.open { display: flex; }
    .prev-img { max-width: 92vw; max-height: 78vh; border-radius: 10px; object-fit: contain; }
    .prev-close { margin-top: 14px; padding: 10px 28px; background: rgba(255,255,255,0.18); border: none; color: white; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.82); color: white; padding: 10px 22px; border-radius: 22px; font-size: 13px; z-index: 2000; opacity: 0; transition: opacity 0.28s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">🛒</div>
  <div class="login-title">웰빙마트 배달</div>
  <div class="login-sub">기사를 선택하세요</div>
  <div class="login-grid">
    <button class="driver-btn" onclick="login('A')"><span class="d-icon">🚚</span><span class="d-name">기사 A</span></button>
    <button class="driver-btn" onclick="login('B')"><span class="d-icon">🚚</span><span class="d-name">기사 B</span></button>
    <button class="driver-btn" onclick="login('C')"><span class="d-icon">🚚</span><span class="d-name">기사 C</span></button>
    <button class="driver-btn" onclick="login('D')"><span class="d-icon">🚚</span><span class="d-name">기사 D</span></button>
  </div>
</div>

<div id="appScreen">
  <div id="fbBar">🔄 Firebase 연결 중...</div>
  <div class="app-header">
    <div class="hd-left">
      <div class="hd-logo">🛒</div>
      <div class="hd-info"><h3 id="hdrName">기사 A</h3><p>웰빙마트 배달 앱</p></div>
    </div>
    <div class="hd-right">
      <div class="gps-pill"><div id="gpsDot" class="gps-dot"></div><span id="gpsTxt">GPS</span></div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-list" onclick="showTab('list')">배송 목록 <span id="pendBadge" class="badge" style="display:none">0</span></button>
    <button class="tab-btn" id="tab-add" onclick="showTab('add')">+ 배송 추가</button>
  </div>
  <div id="pane-list" class="tab-pane active">
    <div class="stats-row">
      <div class="stat-box"><div id="sTotal" class="stat-n">0</div><div class="stat-l">전체</div></div>
      <div class="stat-box"><div id="sDoing" class="stat-n">0</div><div class="stat-l">배송중</div></div>
      <div class="stat-box"><div id="sDone" class="stat-n">0</div><div class="stat-l">완료</div></div>
    </div>
    <div id="activeList"></div>
    <div id="doneList"></div>
  </div>
  <div id="pane-add" class="tab-pane">
    <div class="form-grp"><label class="form-lbl">고객명 *</label><input type="text" class="form-inp" id="fName" placeholder="홍길동"></div>
    <div class="form-grp"><label class="form-lbl">주소 *</label><input type="text" class="form-inp" id="fAddr" placeholder="서울시 강남구 역삼동 123"></div>
    <div class="form-grp"><label class="form-lbl">전화번호</label><input type="tel" class="form-inp" id="fPhone" placeholder="010-0000-0000"></div>
    <div class="form-grp"><label class="form-lbl">메모</label><textarea class="form-inp" id="fNote" placeholder="배송 시 유의사항..."></textarea></div>
    <button class="submit-btn" onclick="addDelivery()">✅ 배송 등록</button>
  </div>
</div>

<div id="camModal" class="modal-bg">
  <div class="cam-wrap">
    <div class="cam-title" id="camTitle">📷 사진 촬영</div>
    <video id="camVideo" autoplay playsinline muted></video>
    <canvas id="camCanvas"></canvas>
    <div class="cam-btns">
      <button class="cbtn cbtn-cancel" onclick="closeCamera()">취소</button>
      <button class="cbtn cbtn-file"   onclick="triggerFile()">📁 갤러리</button>
      <button class="cbtn cbtn-shoot"  onclick="shootPhoto()">📸 촬영</button>
    </div>
  </div>
  <input type="file" id="fileInp" accept="image/*" style="display:none" onchange="onFileChosen(event)">
</div>

<div id="prevModal" class="prev-bg">
  <img id="prevImg" class="prev-img" src="" alt="photo">
  <button class="prev-close" onclick="closePreview()">닫기</button>
</div>

<div id="toast" class="toast"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB5Go7l-xjB6XOegGPGYwXuCOaypz6cj-o",
  authDomain: "wellbingmart-d5ee1.firebaseapp.com",
  databaseURL: "https://wellbingmart-d5ee1-default-rtdb.firebaseio.com",
  projectId: "wellbingmart-d5ee1",
  storageBucket: "wellbingmart-d5ee1.firebasestorage.app",
  messagingSenderId: "948810299813",
  appId: "1:948810299813:web:10856267d9016df490104c"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref('.info/connected').on('value', snap => {
  const bar = document.getElementById('fbBar');
  if (snap.val()) {
    bar.textContent = '🟢 실시간 연결됨';
    bar.className = 'online';
    setTimeout(() => { bar.style.display = 'none'; }, 2500);
  } else {
    bar.textContent = '🔴 오프라인 — 연결 복구 중...';
    bar.className = '';
    bar.style.display = 'block';
  }
});

let driver = null, gpsTimer = null, delivListener = null, camStream = null, photoJob = null;

function login(id) {
  driver = id;
  localStorage.setItem('wb_driver', id);
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
  document.getElementById('hdrName').textContent = '기사 ' + id;
  db.ref('drivers/' + id).update({ name: '기사 ' + id, online: true, lastSeen: Date.now() });
  startGPS();
  listenDeliveries();
}

function doLogout() {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  stopGPS();
  if (driver) db.ref('drivers/' + driver).update({ online: false });
  if (delivListener) db.ref('deliveries').off('value', delivListener);
  driver = null;
  localStorage.removeItem('wb_driver');
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

window.addEventListener('load', () => { const s = localStorage.getItem('wb_driver'); if (s) login(s); });

function startGPS() {
  function upd() {
    navigator.geolocation.getCurrentPosition(pos => {
      db.ref('drivers/' + driver + '/location').set({ lat: pos.coords.latitude, lng: pos.coords.longitude, updatedAt: Date.now() });
      document.getElementById('gpsDot').className = 'gps-dot on';
      document.getElementById('gpsTxt').textContent = 'GPS ✓';
    }, () => {
      document.getElementById('gpsDot').className = 'gps-dot';
      document.getElementById('gpsTxt').textContent = 'GPS ✗';
    }, { enableHighAccuracy: true, timeout: 10000 });
  }
  upd();
  gpsTimer = setInterval(upd, 30000);
}

function stopGPS() { if (gpsTimer) { clearInterval(gpsTimer); gpsTimer = null; } }

function listenDeliveries() {
  delivListener = db.ref('deliveries').orderByChild('driverId').equalTo(driver)
    .on('value', snap => {
      const list = [];
      snap.forEach(c => list.push({ id: c.key, ...c.val() }));
      renderAll(list);
    });
}

function renderAll(list) {
  const active    = list.filter(d => d.status !== 'completed');
  const done      = list.filter(d => d.status === 'completed');
  const delivering = list.filter(d => d.status === 'delivering');
  document.getElementById('sTotal').textContent = list.length;
  document.getElementById('sDoing').textContent = delivering.length;
  document.getElementById('sDone').textContent  = done.length;
  const badge = document.getElementById('pendBadge');
  if (active.length) { badge.textContent = active.length; badge.style.display = 'inline'; } else badge.style.display = 'none';
  const activeEl = document.getElementById('activeList');
  activeEl.innerHTML = active.length ? active.map(cardHtml).join('') : (done.length === 0 ? '<div class="empty"><div class="ei">📦</div><p>배송 목록이 없습니다.<br>＋ 배송 추가 탭에서 등록해 주세요.</p></div>' : '');
  const doneEl = document.getElementById('doneList');
  doneEl.innerHTML = done.length ? '<div class="sec-head">✅ 완료된 배송 (' + done.length + '건)</div>' + done.map(cardHtml).join('') : '';
}

function cardHtml(d) {
  const sc = {pending:'pending',delivering:'delivering',completed:'completed'}[d.status]||'pending';
  const st = {pending:'대기중',delivering:'배송중',completed:'완료'}[d.status]||'대기중';
  const ct = d.createdAt   ? fmtTime(d.createdAt)   : '';
  const ft = d.completedAt ? fmtTime(d.completedAt) : '';
  let actions = '';
  if (d.status === 'pending') {
    actions = '<button class="act-btn btn-start" onclick="startDelivery(\''+d.id+'\')">🚗 출발</button>'
            + '<button class="act-btn btn-receipt" onclick="openCam(\''+d.id+'\',\'receipt\')">📷 영수증</button>'
            + '<button class="act-btn btn-call" onclick="callNum(\''+d.phone+'\')">📞 전화</button>';
  } else if (d.status === 'delivering') {
    actions = '<button class="act-btn btn-receipt" onclick="openCam(\''+d.id+'\',\'receipt\')">📷 영수증</button>'
            + '<button class="act-btn btn-done" onclick="openCam(\''+d.id+'\',\'completion\')">✅ 완료촬영</button>'
            + '<button class="act-btn btn-call" onclick="callNum(\''+d.phone+'\')">📞 전화</button>';
  } else {
    if (d.receiptPhoto)    actions += '<button class="act-btn btn-view" onclick="viewPhoto(\''+d.id+'\',\'receipt\')">🧾 영수증</button>';
    if (d.completionPhoto) actions += '<button class="act-btn btn-view" onclick="viewPhoto(\''+d.id+'\',\'completion\')">📸 완료사진</button>';
  }
  return '<div class="d-card ' + sc + '">'
    + '<div class="d-card-top"><span class="d-customer">' + esc(d.customerName||'고객') + '</span><span class="st-badge st-' + sc + '">' + st + '</span></div>'
    + '<div class="d-addr">📍 ' + esc(d.address||'-') + '</div>'
    + (d.phone ? '<div class="d-phone">📞 ' + esc(d.phone) + '</div>' : '')
    + (d.note  ? '<div class="d-note">💬 ' + esc(d.note)  + '</div>' : '')
    + '<div class="d-meta">'
    + (ct ? '<span>등록 ' + ct + '</span>' : '')
    + (ft ? '<span>완료 ' + ft + '</span>' : '')
    + (d.receiptPhoto    ? '<span class="has-photo">🧾 영수증</span>' : '')
    + (d.completionPhoto ? '<span class="has-photo">📸 완료사진</span>' : '')
    + '</div>'
    + '<div class="d-actions">' + actions + '</div>'
    + '</div>';
}

function startDelivery(id) {
  db.ref('deliveries/' + id).update({ status: 'delivering', startedAt: Date.now() });
  toast('배송을 시작합니다 🚗');
}

async function addDelivery() {
  const name  = document.getElementById('fName').value.trim();
  const addr  = document.getElementById('fAddr').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const note  = document.getElementById('fNote').value.trim();
  if (!name || !addr) { toast('고객명과 주소를 입력해 주세요'); return; }
  await db.ref('deliveries').push({ driverId: driver, customerName: name, address: addr, phone: phone||'', note: note||'', status: 'pending', createdAt: Date.now(), receiptPhoto: null, completionPhoto: null });
  ['fName','fAddr','fPhone','fNote'].forEach(id => document.getElementById(id).value = '');
  toast('배송 등록 완료 ✅');
  showTab('list');
}

function callNum(phone) { if (phone) window.location.href = 'tel:' + phone; }

function viewPhoto(id, type) {
  db.ref('deliveries/' + id).once('value').then(snap => {
    const d = snap.val();
    const src = type === 'receipt' ? d.receiptPhoto : d.completionPhoto;
    if (src) { document.getElementById('prevImg').src = src; document.getElementById('prevModal').classList.add('open'); }
    else toast('사진이 없습니다');
  });
}

function closePreview() { document.getElementById('prevModal').classList.remove('open'); }

function openCam(id, type) {
  photoJob = { id, type };
  document.getElementById('camTitle').textContent = type === 'receipt' ? '📷 영수증 사진 촬영' : '📸 완료 사진 촬영';
  document.getElementById('camModal').classList.add('open');
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
    .then(stream => { camStream = stream; const v = document.getElementById('camVideo'); v.srcObject = stream; v.style.display = 'block'; })
    .catch(() => { document.getElementById('camVideo').style.display = 'none'; });
}

function closeCamera() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  const v = document.getElementById('camVideo'); v.srcObject = null; v.style.display = 'block';
  document.getElementById('camModal').classList.remove('open');
  photoJob = null;
}

function shootPhoto() {
  const video = document.getElementById('camVideo');
  if (!camStream || !video.videoWidth) { triggerFile(); return; }
  savePhoto(compress(video));
}

function triggerFile() { document.getElementById('fileInp').click(); }

function onFileChosen(e) {
  const file = e.target.files[0]; if (!file) return;
  const img = new Image(); const url = URL.createObjectURL(file);
  img.onload = () => { savePhoto(compress(img)); URL.revokeObjectURL(url); };
  img.src = url; e.target.value = '';
}

function compress(el) {
  const MAX = 800;
  let w = el.videoWidth||el.naturalWidth||el.width, h = el.videoHeight||el.naturalHeight||el.height;
  if (w > h && w > MAX) { h = Math.round(h*MAX/w); w = MAX; } else if (h > MAX) { w = Math.round(w*MAX/h); h = MAX; }
  const c = document.getElementById('camCanvas'); c.width = w; c.height = h;
  c.getContext('2d').drawImage(el, 0, 0, w, h);
  return c.toDataURL('image/jpeg', 0.62);
}

function savePhoto(base64) {
  if (!photoJob) return;
  const { id, type } = photoJob;
  const upd = type === 'receipt' ? { receiptPhoto: base64 } : { completionPhoto: base64, status: 'completed', completedAt: Date.now() };
  db.ref('deliveries/' + id).update(upd)
    .then(() => { toast(type==='receipt'?'영수증 저장 완료 ✅':'배송 완료! 🎉'); closeCamera(); })
    .catch(err => toast('저장 실패: ' + err.message));
}

function showTab(name) {
  ['list','add'].forEach(n => {
    document.getElementById('tab-'+n).classList.toggle('active', n===name);
    document.getElementById('pane-'+n).classList.toggle('active', n===name);
  });
}

function toast(msg) {
  const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}

function fmtTime(ts) { return new Date(ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
