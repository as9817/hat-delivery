<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>햇배달 로그인</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f6f9;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{width:100%;max-width:380px;background:#fff;border-radius:18px;padding:36px 28px;box-shadow:0 8px 30px rgba(0,0,0,.08)}
.logo{font-size:34px;text-align:center;margin-bottom:6px}
h1{font-size:19px;text-align:center;color:#1a1a2e;margin-bottom:4px}
.sub{font-size:13px;text-align:center;color:#888;margin-bottom:26px}
label{font-size:13px;color:#555;display:block;margin-bottom:6px;font-weight:600}
input{width:100%;border:1.5px solid #e0e0e0;border-radius:10px;padding:12px 14px;font-size:14px;outline:none;margin-bottom:16px;font-family:inherit}
input:focus{border-color:#ff7a3d}
.btn{width:100%;background:#ff7a3d;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.btn:disabled{opacity:.6;cursor:default}
.err{display:none;background:#fff0ee;color:#d23c2f;font-size:13px;border-radius:8px;padding:10px 12px;margin-bottom:14px}
.err.show{display:block}
.foot{text-align:center;margin-top:18px;font-size:12px;color:#aaa}
</style>
</head>
<body>
<div class="box">
  <div class="logo">🛵</div>
  <h1>햇배달</h1>
  <div class="sub">테넌트 계정으로 로그인하세요</div>
  <div class="err" id="err"></div>
  <label>이메일</label>
  <input id="email" type="email" placeholder="you@company.com" autocomplete="username">
  <label>비밀번호</label>
  <input id="pw" type="password" placeholder="••••••••" autocomplete="current-password">
  <button class="btn" id="loginBtn" onclick="hdLogin()">로그인</button>
  <div class="foot">계정 문의는 관리자에게 연락하세요</div>
  <div class="foot" style="margin-top:8px;color:#bbb;line-height:1.6">한 번 로그인하면 브라우저를 닫아도 자동 로그인됩니다.<br>다른 계정으로 바꾸려면 OMS에서 로그아웃 후 다시 로그인하세요.</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_QC1p052HO3TEv0SnTjgS3LL9pY5Xfww",
  authDomain: "hatdelivery-saas.firebaseapp.com",
  databaseURL: "https://hatdelivery-saas-default-rtdb.firebaseio.com",
  projectId: "hatdelivery-saas",
  storageBucket: "hatdelivery-saas.firebasestorage.app",
  messagingSenderId: "609228475077",
  appId: "1:609228475077:web:6a72b2c8f58e8a0e133eac",
  measurementId: "G-E327TX7FT2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// ══════════════════════════════════════════
// 운영 모니터링: 클라이언트 오류 자동 기록 (슈퍼어드민 알림용)
// ══════════════════════════════════════════
function logSystemError(err, source) {
  try {
    const msg = (err && (err.message || err.reason)) || String(err) || '알 수 없는 오류';
    db.ref('system_logs/errors').push({
      ts: Date.now(),
      message: String(msg).slice(0, 300),
      stack: (err && err.stack) ? String(err.stack).slice(0, 500) : '',
      source: source || 'login',
      tenantId: null,
      url: location.href.slice(0, 200),
      ua: navigator.userAgent.slice(0, 150)
    }).catch(function () {});
  } catch (e) {}
}
window.addEventListener('error', function (e) { logSystemError(e.error || e.message, 'login'); });
window.addEventListener('unhandledrejection', function (e) { logSystemError(e.reason, 'login'); });

// 이미 로그인 돼있고 유효한 세션이면 자동 이동
auth.onAuthStateChanged(function (user) {
  if (!user) return;
  routeAfterLogin(user, /*silent=*/true);
});

function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg;
  e.classList.add('show');
}

function hdLogin() {
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('pw').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('err');
  errEl.classList.remove('show');

  if (!email || !pw) { showErr('이메일과 비밀번호를 입력해주세요'); return; }

  btn.disabled = true;
  btn.textContent = '로그인 중...';

  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(function () {
    return auth.signInWithEmailAndPassword(email, pw);
  }).then(function (cred) {
    return routeAfterLogin(cred.user, false);
  }).catch(function (e) {
    btn.disabled = false;
    btn.textContent = '로그인';
    if (e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found') {
      showErr('이메일 또는 비밀번호가 올바르지 않습니다');
    } else {
      showErr('로그인 오류: ' + e.message);
    }
  });
}

// 로그인 성공 후: 슈퍼어드민 -> superadmin.html / 테넌트 사용자 -> app.html
function routeAfterLogin(user, silent) {
  return db.ref('superadmins/' + user.uid).once('value').then(function (saSnap) {
    if (saSnap.val() === true) {
      localStorage.setItem('hd_role', 'superadmin');
      location.href = 'superadmin.html';
      return;
    }
    return db.ref('users/' + user.uid).once('value').then(function (snap) {
      const info = snap.val();
      if (!info || !info.tenantId) {
        if (!silent) showErr('이 계정에 연결된 테넌트가 없습니다. 관리자에게 문의하세요.');
        auth.signOut();
        return;
      }
      if (info.active === false) {
        if (!silent) showErr('비활성화된 계정입니다. 관리자에게 문의하세요.');
        auth.signOut();
        return;
      }
      return db.ref('tenant_meta/' + info.tenantId).once('value').then(function (metaSnap) {
        const meta = metaSnap.val() || {};
        if (meta.active === false) {
          if (!silent) showErr('마트 서비스가 비활성화되었습니다. 관리자에게 문의하세요.');
          auth.signOut();
          return;
        }
        if (meta.planExpiry && meta.planExpiry < Date.now()) {
          if (!silent) showErr('구독이 만료되었습니다. 관리자에게 문의하세요.');
          auth.signOut();
          return;
        }
        localStorage.setItem('hd_tenant_id', info.tenantId);
        localStorage.setItem('hd_tenant_name', meta.name || '');
        localStorage.setItem('hd_role', info.role || 'staff');
        location.href = 'app.html';
      });
    });
  }).catch(function (e) {
    if (!silent) showErr('로그인 확인 중 오류: ' + e.message);
  });
}
</script>
</body>
</html>
